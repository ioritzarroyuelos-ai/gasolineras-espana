name: Configure Web Push (one-shot)

# Ship 23 setup: configura VAPID + aplica migracion 0005 + redeploy para
# activar las alertas Web Push en prod. Diseñado para correr UNA VEZ; re-
# ejecutarlo rotaria las claves e invalidaria todas las suscripciones activas
# (el navegador rechaza pushes firmados con otra publicKey). Por eso exige
# `force=true` si ya hay claves configuradas.
#
# Flujo:
#   1) Genera par VAPID (ECDSA P-256) en el runner.
#   2) Escribe VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / VAPID_SUBJECT como env
#      vars del environment "production" del proyecto CF Pages (la privada
#      como secret_text — cifrada at-rest en CF).
#   3) Aplica migracion 0005 (push_subscriptions table) en D1 remoto.
#   4) Fuerza un deploy nuevo para que las env vars entren en efecto.
#   5) Verifica que /api/push/vapid-key responde 200 con la publicKey.
#
# Requisitos (ya configurados):
#   - secrets.CLOUDFLARE_API_TOKEN con scopes Pages:Edit + D1:Edit
#   - secrets.CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:
    inputs:
      subject:
        description: "VAPID subject (mailto:... o https://...)"
        required: true
        default: "mailto:ioritz@example.com"
      force:
        description: "Sobreescribir si ya hay claves configuradas (invalida suscripciones existentes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: configure-webpush
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      PROJECT: webapp
      PUBLIC_ORIGIN: https://webapp-3ft.pages.dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Safety check — abortar si ya hay VAPID salvo force=true
        run: |
          STATUS=$(curl -sS --max-time 15 -o /tmp/vapid.json -w "%{http_code}" \
            "${PUBLIC_ORIGIN}/api/push/vapid-key" || echo "000")
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "::error::VAPID ya configurado en prod. Re-ejecutar con force=true para rotar (esto invalidara TODAS las suscripciones activas)."
            cat /tmp/vapid.json
            exit 1
          fi
          echo "safety ok — status=$STATUS, force=${{ inputs.force }}"

      - name: Generar par VAPID
        id: vapid
        run: |
          node -e "
            const { subtle } = globalThis.crypto;
            (async () => {
              const kp = await subtle.generateKey({name:'ECDSA', namedCurve:'P-256'}, true, ['sign','verify']);
              const pubJwk = await subtle.exportKey('jwk', kp.publicKey);
              const privJwk = await subtle.exportKey('jwk', kp.privateKey);
              const x = Buffer.from(pubJwk.x, 'base64url');
              const y = Buffer.from(pubJwk.y, 'base64url');
              const uncompressed = Buffer.concat([Buffer.from([0x04]), x, y]);
              const d = Buffer.from(privJwk.d, 'base64url');
              console.log('PUB=' + uncompressed.toString('base64url'));
              console.log('PRIV=' + d.toString('base64url'));
            })().catch(e => { console.error(e); process.exit(1); });
          " > keys.txt
          PUB=$(grep '^PUB=' keys.txt | cut -d= -f2-)
          PRIV=$(grep '^PRIV=' keys.txt | cut -d= -f2-)
          rm -f keys.txt
          # Mask la privada en los logs de GHA (por si algun paso la imprime)
          echo "::add-mask::$PRIV"
          echo "public=$PUB" >> $GITHUB_OUTPUT
          echo "private=$PRIV" >> $GITHUB_OUTPUT
          echo "publicKey generada (long=${#PUB}), privateKey enmascarada (long=${#PRIV})"

      - name: Set env vars VAPID en Cloudflare Pages (production)
        env:
          TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUB:        ${{ steps.vapid.outputs.public }}
          PRIV:       ${{ steps.vapid.outputs.private }}
          SUBJECT:    ${{ inputs.subject }}
        run: |
          set -e
          # Primero leer la config actual para hacer merge (asi no pisamos
          # CRON_TOKEN u otras env vars ya configuradas).
          CURRENT=$(curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/${PROJECT}")
          if [ "$(echo "$CURRENT" | jq -r '.success')" != "true" ]; then
            echo "::error::GET project fallo"
            echo "$CURRENT" | jq '.errors'
            exit 1
          fi
          # Mergeamos nuestras 3 env vars encima de las existentes.
          DATA=$(echo "$CURRENT" | jq --arg pub "$PUB" --arg priv "$PRIV" --arg subj "$SUBJECT" '{
            deployment_configs: {
              production: (
                .result.deployment_configs.production
                | .env_vars = ((.env_vars // {}) + {
                    VAPID_PUBLIC_KEY:  { value: $pub,  type: "plain_text" },
                    VAPID_PRIVATE_KEY: { value: $priv, type: "secret_text" },
                    VAPID_SUBJECT:     { value: $subj, type: "plain_text" }
                  })
              )
            }
          }')
          RES=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/${PROJECT}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data "$DATA")
          if [ "$(echo "$RES" | jq -r '.success')" != "true" ]; then
            echo "::error::PATCH env_vars fallo"
            echo "$RES" | jq '.errors'
            exit 1
          fi
          echo "env_vars actualizadas OK"
          echo "$RES" | jq '.result.deployment_configs.production.env_vars | keys'

      - name: Install deps para wrangler
        run: npm ci --no-audit --no-fund

      - name: Aplicar migracion D1 0005 (push_subscriptions)
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # `migrations apply` es idempotente: solo aplica las que aun no estan
          # en la tabla d1_migrations. Si 0005 ya estaba, esto es un no-op.
          npx wrangler d1 migrations apply gasolineras-history --remote --yes

      - name: Re-build y re-deploy para que las env vars entren en efecto
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Las env vars recien seteadas NO aplican a deployments existentes;
          # solo a nuevos. Forzamos un deploy del HEAD actual.
          npm run icons
          npm run build
          test -f dist/_worker.js || { echo "::error::build fallo — _worker.js missing"; exit 1; }
          npx wrangler@4 pages deploy dist \
            --project-name="${PROJECT}" \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${{ github.sha }}"

      - name: Verificar /api/push/vapid-key en prod
        run: |
          # CF Pages necesita ~15s para propagar el deploy a la URL canonica.
          sleep 25
          RES=$(curl -fsS --max-time 20 --retry 3 --retry-delay 10 \
            "${PUBLIC_ORIGIN}/api/push/vapid-key")
          echo "response: $RES"
          GOT_PUB=$(echo "$RES" | jq -r '.publicKey')
          EXPECT="${{ steps.vapid.outputs.public }}"
          if [ "$GOT_PUB" != "$EXPECT" ]; then
            echo "::error::publicKey en prod no coincide con la generada"
            echo "expected: $EXPECT"
            echo "got:      $GOT_PUB"
            exit 1
          fi
          echo "✓ prod devuelve la publicKey correcta"

      - name: Resumen
        if: always()
        run: |
          echo "### Web Push configurado" >> $GITHUB_STEP_SUMMARY
          echo "- VAPID_PUBLIC_KEY: \`${{ steps.vapid.outputs.public }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- VAPID_PRIVATE_KEY: [masked — guardada en CF Pages como secret_text]" >> $GITHUB_STEP_SUMMARY
          echo "- VAPID_SUBJECT: \`${{ inputs.subject }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Migracion D1 0005: aplicada (idempotente)" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy nuevo: emitido para que las env vars entren en efecto" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Prueba desde un dispositivo: abre ${PUBLIC_ORIGIN}, marca un favorito, y pulsa \"Activar alertas\" en el modal de favoritos." >> $GITHUB_STEP_SUMMARY
