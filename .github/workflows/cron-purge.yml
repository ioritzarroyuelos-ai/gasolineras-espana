name: D1 cron — purga semanal >2 anos

# Domingos 03:00 UTC: POST a /api/cron/purge, que borra filas con date <
# hoy-2a. Mantiene la BD dentro del free tier (5 GB de D1).
#
# Mismos requisitos que cron-ingest: secret CRON_TOKEN + variable
# PUBLIC_ORIGIN (opcional, cae a webapp.pages.dev).

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: cron-purge
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: POST /api/cron/purge
        env:
          CRON_TOKEN:    ${{ secrets.CRON_TOKEN }}
          PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::error::CRON_TOKEN secret no configurado — abortando."
            exit 1
          fi
          ORIGIN="${PUBLIC_ORIGIN:-https://webapp.pages.dev}"
          echo "Invocando ${ORIGIN}/api/cron/purge"
          curl -fsS --retry 3 --retry-delay 5 --max-time 60 \
            -X POST "$ORIGIN/api/cron/purge" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            -H "Accept: application/json" \
            -w "\nHTTP %{http_code} in %{time_total}s\n"
