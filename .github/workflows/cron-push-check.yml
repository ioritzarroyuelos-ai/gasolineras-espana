name: Push cron — comprobador de bajadas de precio (cada 2h)

# Ship 23: cada 2h (:15 para evitar colisionar con otros crons) invoca
# /api/cron/push-check, que itera las suscripciones Web Push en D1, compara
# precios contra baseline y manda pushes VAPID si la caida supera el umbral.
#
# Requisitos:
#   - secrets.CRON_TOKEN (mismo que cron-ingest/cron-purge).
#   - En Cloudflare Pages env vars: VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY,
#     VAPID_SUBJECT. Si alguno falta, el endpoint devuelve 503 y este
#     workflow fallara fuerte — es lo que queremos (alerta loud) hasta
#     configurar las claves.
#
# Generacion de VAPID (una sola vez, offline):
#   node -e 'import("./src/lib/webpush.ts").then(m=>m.generateVapidKeys()).then(console.log)'
#   ... o usar `web-push generate-vapid-keys` (herramienta npm estandar).

on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch:

concurrency:
  group: cron-push-check
  cancel-in-progress: false

jobs:
  push-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: POST /api/cron/push-check
        env:
          CRON_TOKEN:    ${{ secrets.CRON_TOKEN }}
          PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::error::CRON_TOKEN secret no configurado — abortando."
            exit 1
          fi
          ORIGIN="${PUBLIC_ORIGIN:-https://webapp-3ft.pages.dev}"
          echo "Invocando ${ORIGIN}/api/cron/push-check"
          # --fail-with-body: sigue siendo curl-fail pero nos deja ver el body
          # en 503 (util para diagnosticar "push_not_configured" en prod).
          curl -fsS --retry 2 --retry-delay 10 --max-time 120 \
            -X POST "$ORIGIN/api/cron/push-check" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            -H "Accept: application/json" \
            -w "\nHTTP %{http_code} in %{time_total}s\n"
