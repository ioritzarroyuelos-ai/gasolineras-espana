name: Deploy

# Se dispara cuando el workflow CI termina en main. Descarga el dist que CI
# subio como artefacto y lo despliega a Cloudflare Pages → produccion.
# Nunca deploya codigo roto: si CI falla (typecheck, tests o build), el
# condicional del job bloquea el deploy.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:        # permite lanzar manualmente desde la UI de GitHub

permissions:
  contents: read
  actions: read             # para leer el artefacto de otro workflow_run + listar runs (gh run list)
  deployments: write        # para que la UI muestre el deploy en "Environments"

# Actions pineadas a versiones Node 24 nativas (download-artifact@v7) para
# evitar la deprecacion de Node 20 en junio 2026. El despliegue llama a
# `npx wrangler pages deploy` directamente en lugar de cloudflare/wrangler-action
# (que aun es Node 20) - asi no tenemos dependencias con la @v4 de esa accion.

# Evita deploys concurrentes pisandose. Si entra otro push mientras este corre,
# el nuevo cancela al antiguo (queremos el ultimo commit en prod, no mezcla).
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages · main → produccion
    runs-on: ubuntu-latest
    # Solo corre si:
    #   - viene de workflow_run con CI verde en main (auto), o
    #   - alguien lo lanza a mano (workflow_dispatch)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    environment:
      name: production
      url: https://webapp-3ft.pages.dev
    steps:
      # Resuelve QUE artefacto descargar. Dos caminos:
      #   1) workflow_run: CI acaba de terminar verde en main -> usamos sus
      #      outputs directamente (run_id + head_sha del event).
      #   2) workflow_dispatch (manual): NO hay workflow_run en el event,
      #      asi que buscamos el ultimo CI verde en main via `gh run list`.
      #      Si la retention de 7d ya expiro el artefacto, el download falla
      #      y deja un error claro al final.
      #
      # Antes, el manual caia al `github.run_id` del propio Deploy (que
      # nunca sube dist-*) y fallaba con 'Artifact not found'. Esto corrige
      # ese bug: el manual trigger tambien funciona out-of-the-box.
      - name: Resolver run de CI con el artefacto
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE="workflow_run (auto tras CI verde)"
          else
            # workflow_dispatch: resolver el ultimo CI verde en main.
            LATEST=$(gh run list \
              --workflow=ci.yml \
              --branch=main \
              --event=push \
              --status=success \
              --limit=1 \
              --json databaseId,headSha \
              --repo "${{ github.repository }}")
            if [ "$(echo "$LATEST" | jq 'length')" = "0" ]; then
              echo "::error::No hay CI runs verdes en main. Haz un push antes de lanzar Deploy manual."
              exit 1
            fi
            RUN_ID=$(echo "$LATEST" | jq -r '.[0].databaseId')
            HEAD_SHA=$(echo "$LATEST" | jq -r '.[0].headSha')
            SOURCE="workflow_dispatch (manual, ultimo CI verde)"
          fi
          echo "Origen: $SOURCE"
          echo "  run_id:   $RUN_ID"
          echo "  head_sha: $HEAD_SHA"
          echo "run_id=$RUN_ID"     >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      # Checkout del commit exacto que validó CI. Lo necesitamos para que
      # `wrangler d1 migrations apply` lea migrations/ y wrangler.jsonc.
      - name: Checkout repo @ commit validado
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ci.outputs.head_sha }}

      - name: Descargar dist del CI run
        # Usa el SHA y run_id resueltos arriba. Asi deployamos exactamente el
        # mismo artefacto validado por CI (no reconstruimos = sin sorpresas).
        # Si el artefacto ya expiro (>7d de retention), GHA falla con
        # "Artifact not found" — el workaround es un empty commit para
        # regenerarlo desde CI, o esperar al siguiente push real.
        uses: actions/download-artifact@v7
        with:
          name: dist-${{ steps.ci.outputs.head_sha }}
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.ci.outputs.run_id }}

      - name: Sanity check del artefacto
        run: |
          test -f dist/_worker.js || { echo "::error::dist/_worker.js no existe"; exit 1; }
          test -f dist/manifest.json || { echo "::error::dist/manifest.json no existe"; exit 1; }
          echo "artefacto OK ($(du -sh dist | cut -f1))"

      # Aplica migraciones D1 pendientes ANTES del deploy de assets. Asi el
      # nuevo codigo nunca se encuentra con un schema viejo (race window = 0).
      # `migrations apply` es idempotente: compara con la tabla interna
      # d1_migrations y solo ejecuta los .sql nuevos. Si no hay pendientes,
      # termina en ~2s sin tocar datos. Es seguro correrlo en cada deploy.
      #
      # Requiere que CLOUDFLARE_API_TOKEN tenga el permiso "Workers D1: Edit"
      # (el de "Pages: Edit" no basta para D1). Si el token no lo tiene, el
      # comando retorna code 7403; el script lo convierte en warning y deja
      # el deploy continuar. Cuando llegue una migracion schema-breaking, el
      # smoke test /api/health fallara y el deploy quedara rojo — asi el
      # drift nunca llega silencioso a prod.
      - name: Aplicar migraciones D1 pendientes
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          OUT=$(npx --yes wrangler@4 d1 migrations apply gasolineras-history --remote 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            if echo "$OUT" | grep -q 'code: 7403'; then
              echo "::warning::D1 migrations skipped: CLOUDFLARE_API_TOKEN sin permiso 'Workers D1: Edit'. Regenera el token con ambos permisos (Pages + D1) y vuelve a guardarlo en GHA. El deploy de assets continua."
              exit 0
            fi
            echo "::error::wrangler d1 migrations apply fallo con exit $RC"
            exit $RC
          fi

      # wrangler-action@v3 aun corre en Node 20. Como `npx wrangler` ya existe
      # en el runner, lo llamamos directamente: mismo resultado sin JS action
      # de Node 20. `--commit-dirty=true` silencia el aviso de que el directorio
      # venga sin .git (estamos deployando un tar de dist/ descargado, no el repo).
      - name: Deploy a Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy dist \
            --project-name=webapp \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${{ steps.ci.outputs.head_sha }}"

      # Smoke post-deploy: valida que /api/health responde 200 {ok:true}.
      # Si rompe, el job queda en rojo -> notificacion automatica y posibilidad
      # de re-run con un revert antes de que el cliente note nada. El sleep
      # da margen para propagacion global del edge (~5-15s empiricamente).
      - name: Smoke test /api/health en prod
        if: success()
        run: |
          sleep 15
          STATUS=$(curl -fsS --max-time 10 \
            -o /tmp/health.json \
            -w "%{http_code}" \
            https://webapp-3ft.pages.dev/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::/api/health devolvio HTTP $STATUS tras el deploy"
            cat /tmp/health.json 2>/dev/null || true
            exit 1
          fi
          if ! jq -e '.ok == true' /tmp/health.json >/dev/null; then
            echo "::error::/api/health no contiene {ok:true}"
            cat /tmp/health.json
            exit 1
          fi
          echo "Prod healthy: $(cat /tmp/health.json)"

      - name: Resumen
        if: success()
        run: |
          echo "### Deploy OK" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ steps.ci.outputs.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://webapp-3ft.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "Health: \`$(cat /tmp/health.json 2>/dev/null || echo 'n/a')\`" >> $GITHUB_STEP_SUMMARY

      # Ship 16: ping Telegram tras el smoke verde. Confirma deploy en el mismo
      # canal que el error-monitor, con formato distinto (🚀 vs ⚠️/✅) para
      # diferenciar a primera vista. Solo corre si todos los pasos previos
      # fueron OK — un deploy roto no manda mensaje (GHA ya deja el run rojo
      # y un sub-workflow de fallos podria anadirse aparte si se quiere).
      #
      # Si faltan los secretos (TELEGRAM_*), el step hace warn + exit 0 en vez
      # de fallar el deploy — la app YA esta arriba, no queremos rojo solo por
      # no haber podido avisar.
      - name: Notify Telegram (deploy OK)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HEAD_SHA:           ${{ steps.ci.outputs.head_sha }}
          TRIGGER:            ${{ github.event_name }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::TELEGRAM_* no configurado, skip notify"
            exit 0
          fi
          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-7)
          # Asunto del commit (primera linea del mensaje), truncado a 100 chars
          # para que el mensaje Telegram quepa holgado. git log -1 funciona
          # porque el step 'Checkout' nos dejo el commit HEAD ya apuntando al
          # head_sha resuelto arriba.
          SUBJECT=$(git log -1 --format=%s 2>/dev/null | head -c 100 || echo "")
          HEALTH=$(cat /tmp/health.json 2>/dev/null || echo "")
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          MSG="🚀 ${TS}
Deploy OK en prod (${TRIGGER})

Commit: ${SHORT_SHA}
Msg:    ${SUBJECT}
URL:    https://webapp-3ft.pages.dev
Health: ${HEALTH}"
          # Best-effort: si Telegram rechaza (bot banneado, chat borrado, etc.)
          # NO queremos que esto rompa el deploy que ya esta verde en prod.
          # De ahi el set +e y el warning en vez de error.
          set +e
          TG_RESP=$(curl -sS --max-time 15 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true")
          RC=$?
          if [ $RC -ne 0 ]; then
            echo "::warning::curl a Telegram fallo (exit $RC), deploy verde igual"
            exit 0
          fi
          TG_OK=$(echo "$TG_RESP" | jq -r '.ok // "false"')
          if [ "$TG_OK" != "true" ]; then
            echo "::warning::Telegram rechazo: $TG_RESP"
            exit 0
          fi
          echo "Telegram notified OK"
