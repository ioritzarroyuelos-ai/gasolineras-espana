name: Fetch farmacias snapshot

# v1.9 — Refresca public/data/farmacias.json una vez al mes desde OSM.
#
# Por que mensual:
#   Las farmacias casi nunca se mueven. Abre una nueva, cierra otra — pero el
#   ritmo real es de 10-20 cambios al mes a nivel nacional sobre 22k puntos.
#   Semanal seria desperdiciar el rate limit de Overpass y hacer commits vacios.
#   Mensual cubre la realidad con holgura.
#
#   Las GUARDIAS semanales son otro workflow (fetch-guardias-*.yml) porque
#   cambian cada semana y vienen de los COFs, no de OSM.

on:
  schedule:
    # Primer dia del mes a las 05:30 UTC = 06:30/07:30 Madrid. Entre el cron
    # de prices (05:00) y el de chargers (lunes 05:00). Dia 1 para que siempre
    # caiga en la misma fecha del mes.
    - cron: '30 5 1 * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Forzar deploy a Pages aunque no haya cambios en el snapshot'
        type: boolean
        default: false

concurrency:
  group: fetch-farmacias
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Fetch snapshot de OSM Overpass
        run: node scripts/fetch-farmacias.mjs

      - name: Commit snapshot si hay cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/farmacias.json
          if git diff --cached --quiet; then
            echo "Sin cambios en farmacias.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): actualizar snapshot de farmacias $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Auto-deploy si cambia el snapshot (mismo patron que fetch-chargers.yml).
  deploy:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true' || github.event.inputs.force_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Verificar que los secrets existen
        id: secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN no configurado — snapshot en repo pero no llega a prod hasta deploy manual."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.secrets.outputs.present == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        if: steps.secrets.outputs.present == 'true'
        run: npm ci

      - name: Build bundle
        if: steps.secrets.outputs.present == 'true'
        run: npm run build

      - name: Deploy a Cloudflare Pages
        if: steps.secrets.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=webapp \
            --branch=main \
            --commit-dirty=true \
            --commit-message="auto-deploy: farmacias refresh $(date -u +%Y-%m-%dT%H:%MZ)"
