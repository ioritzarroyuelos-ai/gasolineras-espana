# Security: npm audit, gitleaks (secretos) y OSV-Scanner (CVEs multi-ecosistema).
#
# Los tres corren en paralelo en cada PR y cada push a main; tambien hay un
# cron diario que saca un "canario" aunque no haya cambios (para capturar CVEs
# descubiertas contra versiones ya deployadas de nuestras deps).
#
# Policy de fallos (intencionada):
#   - npm audit: solo falla con severity=high o critical. 'moderate' es ruidoso
#     y muchas veces no afecta al runtime del Worker (dev deps).
#   - gitleaks: cualquier hallazgo falla el job. Un secret commited es critico
#     aunque despues se rote — el historial git lo preserva para siempre.
#   - osv-scanner: falla si hay al menos una vuln de nivel HIGH/CRITICAL.

name: Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Diario 05:00 UTC. Asi detectamos CVEs publicadas aunque no haya push.
    - cron: '0 5 * * *'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Actions pineadas a Node 24: checkout@v5, setup-node@v5. Gitleaks se instala
# como binario nativo (la action oficial aun corre en Node 20). OSV-Scanner
# corre en Docker (inmune a la deprecacion). CodeQL upload-sarif@v3 ya es
# Node 24 nativo.

jobs:
  npm-audit:
    name: npm audit (high+critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install (prod only)
        # --omit=dev audita solo lo que llega al runtime. Las dev deps las cubre
        # OSV-Scanner mas abajo, con CVEs actualizadas y por paths reales.
        run: npm ci --no-audit --no-fund --omit=dev

      - name: Audit runtime deps
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Historial completo: queremos detectar secretos en commits antiguos
          # que alguien podria rotar sin limpiar el git log.
          fetch-depth: 0

      # Instalamos el binario de gitleaks directamente en vez de usar
      # gitleaks/gitleaks-action@v2 (que aun corre en Node 20). Asi evitamos la
      # deprecacion sin perder funcionalidad. Pineamos la version para que un
      # release sorpresa no rompa silenciosamente el scan.
      - name: Install gitleaks (binary)
        env:
          GITLEAKS_VERSION: '8.29.0'
        run: |
          set -euo pipefail
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks scan (fail on any finding)
        # --redact oculta el valor del secret en los logs (metadatos y path si,
        # valor no). --no-banner silencia el ASCII art. Exit 1 si hay hallazgos.
        run: gitleaks detect --source . --verbose --redact --no-banner

  osv-scan:
    name: OSV-Scanner (CVE lockfile)
    runs-on: ubuntu-latest
    permissions:
      # OSV sube SARIF al panel Code scanning, necesita este permiso.
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true

      - name: Upload SARIF to Code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif
