<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Gasolineras España - precios oficiales en tiempo real">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#052e1b"/>
      <stop offset="0.55" stop-color="#14532d"/>
      <stop offset="1"    stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.55">
      <stop offset="0"   stop-color="#22c55e" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- icono en circulo -->
  <g transform="translate(80 180)">
    <rect width="180" height="180" rx="40" fill="url(#badge)"/>
    <g fill="#ffffff" transform="translate(32 32) scale(1.8)">
      <rect x="14" y="16" width="22" height="32" rx="3"/>
      <rect x="17" y="19" width="16" height="10" rx="1.5" fill="#14532d"/>
      <circle cx="21" cy="24" r="1.4" fill="#86efac"/>
      <rect x="18" y="34" width="14" height="2.2" rx="1" fill="#bbf7d0"/>
      <rect x="18" y="38" width="10" height="2.2" rx="1" fill="#bbf7d0"/>
      <path d="M36 22 Q44 22 44 30 L44 42 Q44 48 50 48 L50 44 Q46 44 46 42 L46 30 Q46 20 36 20 Z"/>
    </g>
  </g>

  <!-- tipografia -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" fill="#ffffff">
    <text x="300" y="240" font-size="84" font-weight="800" letter-spacing="-2">Gasolineras España</text>
    <text x="300" y="310" font-size="38" font-weight="500" fill="#bbf7d0">Precios oficiales · en tiempo real</text>

    <!-- chips de combustible -->
    <g transform="translate(300 360)" font-size="26" font-weight="600">
      <g>
        <rect x="0"   y="0" width="190" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#86efac" stroke-opacity="0.35"/>
        <text x="95"  y="37" text-anchor="middle" fill="#ecfdf5">⛽ Gasolina 95</text>
      </g>
      <g transform="translate(210 0)">
        <rect x="0"   y="0" width="150" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#86efac" stroke-opacity="0.35"/>
        <text x="75"  y="37" text-anchor="middle" fill="#ecfdf5">🛢️ Diesel</text>
      </g>
      <g transform="translate(380 0)">
        <rect x="0"   y="0" width="120" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#86efac" stroke-opacity="0.35"/>
        <text x="60"  y="37" text-anchor="middle" fill="#ecfdf5">💧 GLP</text>
      </g>
      <g transform="translate(520 0)">
        <rect x="0"   y="0" width="180" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#86efac" stroke-opacity="0.35"/>
        <text x="90"  y="37" text-anchor="middle" fill="#ecfdf5">🔋 Hidrógeno</text>
      </g>
    </g>

    <!-- footer -->
    <text x="300" y="500" font-size="22" font-weight="400" fill="#86efac" opacity="0.85">Mapa · Comparador · Favoritos · Offline</text>
    <text x="300" y="535" font-size="20" font-weight="400" fill="#86efac" opacity="0.6">Datos del Ministerio para la Transición Ecológica</text>
  </g>
</svg>
